      tags:
        - Bitcoin
        - Litecoin
        - Dogecoin
      summary: Blockchain status
      operationId: getStatus
      description: |
        Returns the current status of both the Blockbook indexer and the connected blockchain backend, including sync state, best block height, mempool info, database size, and backend version details.
