          description: OK
      operationId: getBlockV2
      description: |
        Returns information about a block including its transactions, subject to paging (1000 transactions per page).

        You can query by either block hash or block height.
      parameters:
        - $ref: "#/components/parameters/page"
      tags:
        - Bitcoin
        - Litecoin
        - Dogecoin
        # - Blocks
  "/block-index/{blockHeight}":
    parameters:
      - $ref: "#/components/parameters/blockHeight"
    get:
      summary: Block hash
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  blockHash:
                    type: string
                x-examples:
                  Example 1:
                    blockHash: ed8f3af8c10ca70a136901c6dd3adf037f0aea8a93fbe9e80939214034300f1e
              examples:
                Example 1:
                  value:
                    blockHash: ed8f3af8c10ca70a136901c6dd3adf037f0aea8a93fbe9e80939214034300f1e
      operationId: getBlockHashV2
      description: |
        Returns the block hash for a given block height.
      tags:
        - Bitcoin
        - Litecoin
        - Dogecoin
        # - Blocks
  "/tx/{txId}":
    parameters:
      - $ref: "#/components/parameters/txId"
    get:
      summary: Transaction
      operationId: getTxV2
      description: |
        Returns normalized transaction data with a consistent structure.

        For confirmed transactions, `blockHeight` contains the block height and `confirmations` the number of confirmations.
        For unconfirmed (mempool) transactions, `blockHeight` is `-1`, `confirmations` is `0`, and the response may include
        `confirmationETABlocks` and `confirmationETASeconds` with estimated confirmation time.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  txid:
                    type: string
                    description: Transaction hash
                  version:
                    type: integer
                    description: Transaction version
                  vin:
                    type: array
                    description: Transaction inputs
                    items:
                      type: object
                      properties:
                        txid:
                          type: string
                        vout:
                          type: integer
                        sequence:
                          type: integer
                        "n":
                          type: integer
                        addresses:
                          type: array
                          items:
                            type: string
                        isAddress:
                          type: boolean
                        value:
                          type: string
                  vout:
                    type: array
                    description: Transaction outputs
                    items:
                      type: object
                      properties:
                        value:
                          type: string
                        "n":
                          type: integer
                        hex:
                          type: string
                        addresses:
                          type: array
                          items:
                            type: string
                        isAddress:
                          type: boolean
                  blockHash:
                    type: string
                    description: Hash of the block containing the transaction
                  blockHeight:
                    type: integer
                    description: Block height. -1 for unconfirmed transactions.
                  confirmations:
                    type: integer
                    description: Number of confirmations. 0 for unconfirmed transactions.
                  blockTime:
                    type: integer
                    description: Block timestamp (unix epoch). For unconfirmed transactions, represents when the transaction was first seen.
                  size:
                    type: integer
                    description: Transaction size in bytes
                  vsize:
                    type: integer
                    description: Virtual size for witness transactions
                  value:
                    type: string
                    description: Total output value
                  valueIn:
                    type: string
                    description: Total input value
                  fees:
                    type: string
                    description: Transaction fee
                  hex:
                    type: string
                    description: Raw transaction hex
              examples:
                Confirmed transaction:
                  value:
                    txid: "f4184fc596403b9d638783cf57adfe4c75c605f6356fbc91338530e9831e9e16"
                    version: 1
                    vin:
                      - txid: "0437cd7f8525ceed2324359c2d0ba26006d92d856a9c20fa0241106ee5a597c9"
                        vout: 0
                        sequence: 4294967295
                        "n": 0
                        addresses:
                          - "12cbQLTFMXRnSzktFkuoG3eHoMeFtpTu3S"
                        isAddress: true
                        value: "5000000000"
                    vout:
                      - value: "1000000000"
                        "n": 0
                        addresses:
                          - "1Q2TWHE3GMdB6BZKafqwxXtWAWgFt5Jvm3"
                        isAddress: true
                      - value: "4000000000"
                        "n": 1
                        addresses:
                          - "12cbQLTFMXRnSzktFkuoG3eHoMeFtpTu3S"
                        isAddress: true
                    blockHash: "00000000d1145790a8694403d4063f323d499e655c83426834d4ce2f8dd4a2ee"
                    blockHeight: 170
                    confirmations: 946061
                    blockTime: 1231731025
                    size: 275
                    value: "5000000000"
                    valueIn: "5000000000"
                    fees: "0"
      tags:
        - Bitcoin
        - Litecoin
        - Dogecoin
        # - Transactions
  "/tx-specific/{txId}":
    parameters:
      - $ref: "#/components/parameters/txId"
    get:
      summary: Transaction (raw)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                Bitcoin:
                  value:
                    txid: "f4184fc596403b9d638783cf57adfe4c75c605f6356fbc91338530e9831e9e16"
                    hash: "f4184fc596403b9d638783cf57adfe4c75c605f6356fbc91338530e9831e9e16"
                    version: 1
                    size: 275
                    vsize: 275
                    weight: 1100
                    locktime: 0
                    vin:
                      - txid: "0437cd7f8525ceed2324359c2d0ba26006d92d856a9c20fa0241106ee5a597c9"
                        vout: 0
                        scriptSig:
                          asm: "304402204e45e16932b8af514961a1d3a1a25fdf3f4f7732e9d624c6c61548ab5fb8cd41..."
                          hex: "47304402204e45e16932b8af514961a1d3a1a25fdf3f4f7732e9d624c6c61548ab5fb8cd41..."
                        sequence: 4294967295
                    vout:
                      - value: 10.0
                        "n": 0
                        scriptPubKey:
                          asm: "04ae1a62fe09c5f51b13905f07f06b99a2f7159b2225f374cd378d71302fa284... OP_CHECKSIG"
                          hex: "4104ae1a62fe09c5f51b13905f07f06b99a2f7159b2225f374cd378d71302fa284..."
                          type: "pubkey"
                      - value: 40.0
                        "n": 1
                        scriptPubKey:
                          asm: "0411db93e1dcdb8a016b49840f8c53bc1eb68a382e97b1482ecad7b148a6909a... OP_CHECKSIG"
                          hex: "410411db93e1dcdb8a016b49840f8c53bc1eb68a382e97b1482ecad7b148a6909a..."
                          type: "pubkey"
                    hex: "0100000001c997a5e56e104102fa209c6a852dd9..."
                    blockhash: "00000000d1145790a8694403d4063f323d499e655c83426834d4ce2f8dd4a2ee"
                    confirmations: 945997
                    time: 1231731025
                    blocktime: 1231731025
      operationId: getTxSpecificV2
      description: |
        Returns transaction data in the exact format as returned by the backend, including all coin-specific fields that are not available in a normalized transaction response.

        Use this endpoint when you need access to raw, backend-specific transaction details such as witness data or other chain-specific properties.
      tags:
        - Bitcoin
        - Litecoin
        - Dogecoin
        # - Transactions
  "/address/{address}":
    parameters:
      - $ref: "#/components/parameters/address"
    get:
      summary: Address
