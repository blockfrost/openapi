        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  blockbook:
                    type: object
                    properties:
                      coin:
                        type: string
                      network:
                        type: string
                      host:
                        type: string
                      version:
                        type: string
                      gitCommit:
                        type: string
                      buildTime:
                        type: string
                      syncMode:
                        type: boolean
                      initialSync:
                        type: boolean
                      inSync:
                        type: boolean
                      bestHeight:
                        type: integer
                      lastBlockTime:
                        type: string
                      inSyncMempool:
                        type: boolean
                      lastMempoolTime:
                        type: string
                      mempoolSize:
                        type: integer
                      decimals:
                        type: integer
                      dbSize:
                        type: integer
                      hasFiatRates:
                        type: boolean
                      currentFiatRatesTime:
                        type: string
                      historicalFiatRatesTime:
                        type: string
                      about:
                        type: string
                  backend:
                    type: object
                    properties:
                      chain:
                        type: string
                      blocks:
                        type: integer
                      headers:
                        type: integer
                      bestBlockHash:
                        type: string
                      difficulty:
                        type: string
                      sizeOnDisk:
                        type: integer
                      version:
                        type: string
                      subversion:
                        type: string
                      protocolVersion:
                        type: string
