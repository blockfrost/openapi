      operationId: getXpubV2
      description: |
        Returns balances and transactions of an extended public key.

        Supported derivation schemes:

        | Scheme | Descriptor format |
        |--------|-------------------|
        | BIP44 | `pkh(xpub)` |
        | BIP49 | `sh(wpkh(xpub))` |
        | BIP84 | `wpkh(xpub)` |
        | BIP86 (Taproot) | `tr(xpub)` |

        The **details** query parameter controls the level of detail in the response (default: `txids`):

        | Value | Description |
        |-------|-------------|
        | `basic` | Address balances only (`balance`, `totalReceived`, `totalSent`, `txs` count). No pagination, no transaction data. |
        | `txids` | *(default)* Adds pagination (`page`, `totalPages`, `itemsOnPage`) and a `txids` array of transaction hashes. Subject to `from`/`to` block height filter and `page`/`pageSize` paging. |
        | `txslight` | Replaces `txids` with a `transactions` array containing lightweight tx objects — vin/vout with addresses and values, block info, fees. No `hex`, `version`, `lockTime`, `size`, or `vsize` fields. Subject to paging. |
        | `txs` | Full transaction details — everything in `txslight` plus `version`, `lockTime`, `size`, `vsize`, and raw `hex`. Subject to paging. |

        The **tokens** parameter controls which derived addresses (BIP44 child addresses) are included in the response:

        | Value | Description |
        |-------|-------------|
        | `nonzero` | *(default)* Only derived addresses with a non-zero balance. Addresses that received funds but spent them all (balance = 0) are excluded. |
        | `used` | All derived addresses that have at least one transaction, including those with zero balance. |
        | `derived` | All derived addresses in the derivation gap, including those that have never been used. Unused addresses lack `balance`, `totalReceived`, and `totalSent` fields. |

        Use the **secondary** parameter (e.g. `secondary=usd`) to include fiat value of the balance.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/fromBlock"
        - $ref: "#/components/parameters/toBlock"
        - $ref: "#/components/parameters/details"
        - $ref: "#/components/parameters/tokens"
        - $ref: "#/components/parameters/secondary"
      tags:
        # - Addresses
        - Bitcoin
        - Litecoin
        - Dogecoin
  "/utxo/{addressOrXpub}":
    parameters:
      - $ref: "#/components/parameters/addressOrXpub"
    get:
      summary: UTXOs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    txid:
                      type: string
                      description: Transaction ID
                    vout:
                      type: integer
                      description: Output index
                    value:
                      type: string
                      description: UTXO amount in the lowest denomination (satoshis)
                    height:
                      type: integer
                      description: Block height. Omitted for unconfirmed UTXOs.
                    confirmations:
                      type: integer
                      description: Number of confirmations. 0 for unconfirmed UTXOs.
                    lockTime:
                      type: integer
                      description: Lock time value. Only present for unconfirmed UTXOs with non-zero lock time.
                    coinbase:
                      type: boolean
                      description: Whether this is a coinbase UTXO. Only detected up to 100 confirmations for performance reasons.
                    address:
                      type: string
                      description: Derived address. Only present when querying by xpub or output descriptor.
                    path:
                      type: string
                      description: Derivation path. Only present when querying by xpub or output descriptor.
              examples:
                Confirmed and unconfirmed:
                  value:
                    - txid: 13d26cd939bf5d155b1c60054e02d9c9b832a85e6ec4f2411be44b6b5a2842e9
                      vout: 0
                      value: "1422303206539"
                      confirmations: 0
                      lockTime: 2648100
                    - txid: a79e396a32e10856c97b95f43da7e9d2b9a11d446f7638dbd75e5e7603128cac
                      vout: 1
                      value: "39748685"
                      height: 2648043
                      confirmations: 47
                      coinbase: true
                    - txid: de4f379fdc3ea9be063e60340461a014f372a018d70c3db35701654e7066b3ef
                      vout: 0
                      value: "122492339065"
                      height: 2646043
                      confirmations: 2047
      operationId: getUTXOV2
      description: |
        Returns an array of unspent transaction outputs (UTXOs) for an address, xpub, or output descriptor.

        By default, both confirmed and unconfirmed UTXOs are returned. Set `confirmed=true` to exclude unconfirmed UTXOs.

        For xpubs or output descriptors, the response also includes the `address` and derivation `path` of each UTXO.
      parameters:
        - $ref: "#/components/parameters/confirmed"
      tags:
        # - Addresses
        - Bitcoin
        - Litecoin
        - Dogecoin
  "/sendtx":
    post:
      summary: Submit transaction
      operationId: postSendTxV2
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: Transaction ID of the submitted transaction
              examples:
                Success:
                  value:
                    result: 7c3be24063f268aaa1ed81b64776798f56088757641a34fb156c4f51ed2e9d25
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message from the backend
              examples:
                Malformed transaction:
                  value:
                    error: "-22: TX decode failed. Make sure the tx has at least one input."
                Already spent inputs:
                  value:
                    error: "-25: bad-txns-inputs-missingorspent"
      description: |
        Submits a signed, raw transaction to the network for broadcasting. Send the hex-encoded transaction data as plain text in the request body.

        On success, returns the transaction ID. On error, returns an error message from the backend.
      requestBody:
        content:
          text/plain:
            schema:
              type: object
              properties: {}
        description: Transaction hex as plain text
      tags:
        # - Transactions
        - Bitcoin
        - Litecoin
        - Dogecoin
components:
  schemas: {}
  securitySchemes:
    project_id:
      type: apiKey
      in: header
      name: project_id
      description: |
        There are multiple token types available based on network you choose
        when creating a Blockfrost a project, for a list of token types
        see available networks.
  parameters:
    blockHashOrHeight:
      name: blockHashOrHeight
      in: path
      required: true
      schema:
        type: string
        example: 00000000000000000035835503f43c878ebb643f3b40bdfd0dfda760da74e73c
      description: Block hash or height
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        example: 1
      description: "specifies page of returned transactions, starting from 1. If out of range, the closest possible page is returned."
    pageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 1000
        example: 1000
      description: Number of items returned per page (1-1000, default 1000)
    blockHeight:
      name: blockHeight
      in: path
      required: true
      schema:
        type: integer
        example: 15
      description: Block height/index
    txId:
      name: txId
      in: path
      required: true
      schema:
        type: string
        example: cd8ec77174e426070d0a50779232bba7312b712e2c6843d82d963d7076c61366
      description: Transaction ID
    address:
      name: address
      in: path
      required: true
      schema:
        type: string
        example: 321x69Cb9HZLWwAWGiUBT1U81r1zPLnEjL
      description: Wallet address
    details:
      name: details
      in: query
      required: false
      schema:
        type: string
        enum:
          - basic
          - tokens
          - tokenBalances
          - txids
          - txslight
          - txs
        default: txids
        example: basic
      description: |
        Level of detail in the response. Possible values:
        `basic` — address balances only (balance, totalReceived, totalSent, txs count), no pagination, no transaction data;
        `txids` — (default) adds pagination and a txids array of transaction hashes, subject to from/to filter and page/pageSize paging;
        `txslight` — replaces txids with lightweight transaction objects (vin/vout with addresses and values, block info, fees), subject to paging;
        `txs` — full transaction details including version, lockTime, size, vsize, and raw hex, subject to paging.
    fromBlock:
      name: fromBlock
      in: query
      required: false
      schema:
        type: integer
        example: 10
      description: Filter results from this block height (inclusive). Default is no filter.
    toBlock:
      name: toBlock
      in: query
      required: false
      schema:
        type: integer
        example: 100
      description: Filter results up to this block height (inclusive). Default is no filter.
    secondary:
      name: secondary
      in: query
      required: false
      schema:
        type: string
        example: usd
      description: Fiat currency code (e.g. `usd`, `eur`) to include fiat values alongside crypto balances in the response.
    xpub:
      name: xpub
      in: path
      required: true
      schema:
        type: string
        example: tpubDC88gkaZi5HvJGxGDNLADkvtdpni3mLmx6vr2KnXmWMG8zfkBRggsxHVBkUpgcwPe2KKpkyvTJCdXHb1UHEWE64vczyyPQfHr1skBcsRedN
      description: "Extended public key (xpub, ypub, zpub) or output descriptor. Regular addresses are not accepted — use the /address endpoint instead."
    tokens:
      name: tokens
      in: query
      required: false
      schema:
        type: string
        default: nonzero
        enum:
          - nonzero
          - used
          - derived
        example: used
      description: |
        Controls which derived addresses (BIP44 child addresses) are included in the xpub response.
        `nonzero` — (default) only addresses with non-zero balance;
        `used` — all addresses with at least one transaction, including zero balance;
        `derived` — all addresses in the derivation gap, including never-used ones.
    confirmed:
      name: confirmed
      in: query
      required: false
      schema:
        type: boolean
        example: true
      description: Set to `true` to exclude unconfirmed UTXOs from the response.
    hex:
      name: hex
      in: path
      required: true
      schema:
        type: string
        example: 
      description: Transaction hex data
    addressOrXpub:
      name: addressOrXpub
      in: path
      required: true
      schema:
        type: string
        example: 321x69Cb9HZLWwAWGiUBT1U81r1zPLnEjL
      description: Address or XPUB
