                #     tokens:
                #       - type: ERC20
                #         name: Tether USD
                #         contract: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
                #         transfers: 3
                #         symbol: USDT
                #         decimals: 6
                #         balance: "4913000000"
      operationId: getAddressV2
      description: |
        Returns balances and transactions of an address.

        The **details** query parameter controls the level of detail in the response (default: `txids`):

        | Value | Description |
        |-------|-------------|
        | `basic` | Address balances only (`balance`, `totalReceived`, `totalSent`, `txs` count). No pagination, no transaction data. |
        | `txids` | *(default)* Adds pagination (`page`, `totalPages`, `itemsOnPage`) and a `txids` array of transaction hashes. Subject to `from`/`to` block height filter and `page`/`pageSize` paging. |
        | `txslight` | Replaces `txids` with a `transactions` array containing lightweight tx objects — vin/vout with addresses and values, block info, fees. No `hex`, `version`, `lockTime`, `size`, or `vsize` fields. Subject to paging. |
        | `txs` | Full transaction details — everything in `txslight` plus `version`, `lockTime`, `size`, `vsize`, and raw `hex`. Subject to paging. |

        Use the **secondary** parameter (e.g. `secondary=usd`) to include fiat value of the balance in the response.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/fromBlock"
        - $ref: "#/components/parameters/toBlock"
        - $ref: "#/components/parameters/details"
