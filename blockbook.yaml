openapi: 3.0.0
info:
  version: 0.1.0
  title: Blockfrost.io ~ Blockbook API documentation
  x-logo:
    url: https://staging.blockfrost.io/images/logo.svg
    altText: Blockfrost
  contact:
    name: Blockfrost Team
    url: "https://blockfrost.io"
    email: contact@blockfrost.io
  license:
    name: MIT
    url: "https://opensource.org/licenses/MIT"
  termsOfService: "https://blockfrost.io/terms"
  description: |
    Blockfrost provides access to Bitcoin, Litecoin and Dogecoin blockchains through the Blockbook API.

    ## Quick Start

    Create a Bitcoin project on [blockfrost.io](https://blockfrost.io) and make your first API call:

    **Get a block by height:**
    ```bash
    curl https://bitcoin-mainnet.blockfrost.io/api/v2/block/1 \
      -H "project_id: YOUR_PROJECT_ID"
    ```

    Response:
    ```json
    {
      "page": 1,
      "totalPages": 1,
      "itemsOnPage": 1000,
      "hash": "00000000839a8e6886ab5951d76f411475428afc90947ee320161bbf18eb6048",
      "height": 1,
      "confirmations": 946061,
      "size": 215,
      "time": 1231469665,
      "txCount": 1,
      "txs": [
        {
          "txid": "0e3e2357e806b6cdb1f70b54c3a3a17b6714ee1f0e68bebb44a74b1efd512098",
          "vin": [{ "n": 0, "isAddress": false, "value": "0" }],
          "vout": [{ "value": "5000000000", "n": 0, "addresses": ["12c6DSiU4Rq3P4ZxziKxzrL5LmMBrzjrJX"], "isAddress": true }],
          "blockHeight": 1,
          "confirmations": 946061,
          "blockTime": 1231469665,
          "value": "5000000000",
          "valueIn": "0",
          "fees": "0"
        }
      ]
    }
    ```

    **Get address balance:**
    ```bash
    curl https://bitcoin-mainnet.blockfrost.io/api/v2/address/12c6DSiU4Rq3P4ZxziKxzrL5LmMBrzjrJX?details=basic \
      -H "project_id: YOUR_PROJECT_ID"
    ```

    Response:
    ```json
    {
      "address": "12c6DSiU4Rq3P4ZxziKxzrL5LmMBrzjrJX",
      "balance": "5135259889",
      "totalReceived": "5135259889",
      "totalSent": "0",
      "unconfirmedBalance": "0",
      "unconfirmedTxs": 0,
      "txs": 226
    }
    ```

    **Get xpub balance and transactions:**
    ```bash
    curl https://bitcoin-mainnet.blockfrost.io/api/v2/xpub/xpub6CUGRUonZSQ4TWtTMmzXdrXDtypWKiKrhko4egpiMZbpiaQL2jkwSB1icqYh2cfDfVxdx4df189oLKnC5fSwqPfgyP3hooxujYzAu3fDVmz?tokens=nonzero&pageSize=3 \
      -H "project_id: YOUR_PROJECT_ID"
    ```

    Response:
    ```json
    {
      "page": 1,
      "totalPages": 10,
      "itemsOnPage": 3,
      "address": "xpub6CUGRUonZSQ4TWtTMmzXdrXDtypWKiKrhko4egpiMZbpiaQL2jkwSB1icqYh2cfDfVxdx4df189oLKnC5fSwqPfgyP3hooxujYzAu3fDVmz",
      "balance": "12835640",
      "totalReceived": "13055640",
      "totalSent": "220000",
      "unconfirmedBalance": "0",
      "unconfirmedTxs": 0,
      "txs": 28,
      "addrTxCount": 28,
      "txids": [
        "88aa69107bccdddb23df8b2635ff759cdc5e6873b91bef91325f70060973299a",
        "38d733842aeddcad34d0e4ef4e498fc0defa4fb9e47c9a4163b8e13483c00f3c",
        "57392367f583c8cdaabf67897eef088dbaab73936ff9dddaa448c2bedc3fad4d"
      ],
      "usedTokens": 23,
      "tokens": [
        {
          "type": "XPUBAddress",
          "name": "1EfgV2Hr5CDjXPavHDpDMjmU33BA2veHy6",
          "path": "m/44'/0'/0'/0/0",
          "transfers": 3,
          "decimals": 8,
          "balance": "10665",
          "totalReceived": "110665",
          "totalSent": "100000"
        },
        {
          "type": "XPUBAddress",
          "name": "1CcEugXu9Yf9Qw5cpB8gHUK4X9683WyghM",
          "path": "m/44'/0'/0'/0/2",
          "transfers": 2,
          "decimals": 8,
          "balance": "19493",
          "totalReceived": "19493",
          "totalSent": "0"
        },
        "..."
      ]
    }
    ```

    ## Authentication

    After signing up on https://blockfrost.io, a `project_id` token is automatically generated for each project.
    Your request must include this `project_id` in the HTTP header to authenticate against Blockfrost servers.

    ```
    project_id: YOUR_PROJECT_ID
    ```

    ## Available networks

    Each network has its own `project_id`. Select the appropriate server from the dropdown above.

    <table>
      <tbody>
        <tr>
          <td><b>Network</b></td>
          <td><b>Endpoint</b></td>
        </tr>
        <tr>
          <td>Bitcoin mainnet</td>
          <td><code>https://bitcoin-mainnet.blockfrost.io/api/v2</code></td>
        </tr>
        <tr>
          <td>Bitcoin testnet</td>
          <td><code>https://bitcoin-testnet.blockfrost.io/api/v2</code></td>
        </tr>
        <tr>
          <td>Litecoin mainnet</td>
          <td><code>https://litecoin-mainnet.blockfrost.io/api/v2</code></td>
        </tr>
        <tr>
          <td>Dogecoin mainnet</td>
          <td><code>https://dogecoin-mainnet.blockfrost.io/api/v2</code></td>
        </tr>
      </tbody>
    </table>

    ## Concepts

    * All crypto amounts are returned as strings in the lowest denomination (e.g. satoshis for Bitcoin, litoshis for Litecoin), without a decimal point.
    * Data is returned in *descending* (newest first, oldest last) order by block height.
    * Results are paginated. The `pageSize` parameter (1-1000, default 1000) controls items per page for most endpoints. Block endpoints always return 1000 transactions per page.
    * Empty or irrelevant fields may be omitted from responses.
    * All values are case sensitive.

    ## Errors

    In addition to error responses returned by Blockbook (such as `404`, `412` and `500`), the API may also return error responses related to Blockfrost:

    * HTTP `400` return code is used when the request is not valid.
    * HTTP `402` return code is used when the projects exceed their daily request limit.
    * HTTP `403` return code is used when the request is not authenticated.
    * HTTP `418` return code is used when the user has been auto-banned for flooding too much after previously receiving error code `402` or `429`.
    * HTTP `429` return code is used when the user has sent too many requests in a given amount of time and therefore has been rate-limited.
    * HTTP `500` return code is used when our endpoints are having a problem.

    ## Limits

    There are two types of limits we are enforcing:

    The first depends on your plan and is the number of request we allow per day. We defined the day from midnight to midnight of UTC time.

    The second is rate limiting. We limit an end user, distinguished by IP address, to 10 requests per second. On top of that, we allow
    each user to send burst of 500 requests, which cools off at rate of 10 requests per second. In essence, a user is allowed to make another
    whole burst after (currently) 500/10 = 50 seconds. E.g. if a user attempts to make a call 3 seconds after whole burst, 30 requests will be processed.
    We believe this should be sufficient for most of the use cases. If it is not and you have a specific use case, please get in touch with us, and
    we will make sure to take it into account as much as we can.
servers:
  - url: https://bitcoin-mainnet.blockfrost.io/api/v2
    description: Bitcoin mainnet network
  - url: https://bitcoin-testnet.blockfrost.io/api/v2
    description: Bitcoin testnet network
  - url: https://litecoin-mainnet.blockfrost.io/api/v2
    description: Litecoin mainnet network
  - url: https://dogecoin-mainnet.blockfrost.io/api/v2
    description: Dogecoin mainnet network
security:
  - project_id: []

paths:
