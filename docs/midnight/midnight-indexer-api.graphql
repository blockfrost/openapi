type DustSpendProcessed implements DustLedgerEvent {
	"""
	The ID of this dust ledger event.
	"""
	id: Int!
	"""
	The hex-encoded serialized event.
	"""
	raw: HexEncoded!
	"""
	The maximum ID of all dust ledger events.
	"""
	maxId: Int!
	"""
	The protocol version.
	"""
	protocolVersion: Int!
}

"""
Current epoch information.
"""
type EpochInfo {
	epochNo: Int!
