get:
  tags:
    - Cardano » Assets
  summary: Asset UTXOs
  description: List of unspent UTxOs containing the specified native asset.
  parameters:
    - in: path
      name: asset
      required: true
      schema:
        type: string
      description: Concatenation of the policy_id and hex-encoded asset_name
      example: "750900e4999ebe0d58f19b634768ba25e525aaf12403bfe8fe130501424f4f4b"
    - in: query
      name: count
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 100
      description: The number of results displayed on one page.
    - in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 21474836
        default: 1
      description: The page number for listing the results.
    - in: query
      name: order
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc
      description: |
        The ordering of items from the point of view of the blockchain,
        not the page listing itself. By default, we return oldest first, newest last.
    - in: query
      name: from
      required: false
      schema:
        type: string
      description: |
        The block height from which (inclusive) to start search for results.
        Has to be lower than or equal to `to` parameter.
      example: "8929261"
    - in: query
      name: to
      required: false
      schema:
        type: string
      description: |
        The block height where (inclusive) to end the search for results.
        Has to be higher than or equal to `from` parameter.
      example: "9999269"
  responses:
    "200":
      description: Return the UTXOs containing the specified asset
      content:
        application/json:
          schema:
            $ref: ../../../../schemas/assets/asset_utxo_content.yaml
    "400":
      $ref: ../../../../responses/errors/400.yaml
    "403":
      $ref: ../../../../responses/errors/403.yaml
    "404":
      $ref: ../../../../responses/errors/404.yaml
    "429":
      $ref: ../../../../responses/errors/429.yaml
    "418":
      $ref: ../../../../responses/errors/418.yaml
    "500":
      $ref: ../../../../responses/errors/500.yaml
