type: array
items:
  type: object
  properties:
    tx_hash:
      type: string
      description: Hash of the transaction.
    cert_index:
      type: integer
      description: Index of the certificate within the transaction.
    voter_role:
      type: string
      enum: [constitutional_committee, drep, spo]
      description: The role of the voter. Can be one of ConstitutionalCommittee, DRep, SPO.
    committee_voter_hash:
      type: string
      nullable: true
    vote:
      type: string
      enum: [yes, no, abstain]
      description: The Vote. Can be one of yes, no, abstain.

  required:
    - tx_hash
    - cert_index
    - voter_role
    - committee_voter_hash
    - vote
example:
  - tx_hash: "b302de601defdf11a5261ed31a263804dac4a582a888c998ce24dec5"
    cert_index: 2
    voter_role: "spo"
    committee_voter_hash: null
    vote: "yes"
